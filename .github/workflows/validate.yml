name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate template YAML parses
        run: |
          python3 -m pip install --quiet pyyaml
          python3 -c "import yaml; yaml.safe_load(open('skills-registry.template.yaml')); print('template YAML OK')"

      - name: Category sync (template vs SKILL.md vs README)
        run: python3 scripts/check-category-sync.py

      - name: Markdown lint
        run: npx -y markdownlint-cli2@0.22.1 "**/*.md"
